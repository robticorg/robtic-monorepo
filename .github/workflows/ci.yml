name: CI

on:
  push:
    branches:
      - main
      - develop
      - '@develop/bot'
  pull_request:
    branches:
      - main
      - develop
      - '@develop/bot'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Check dependencies
        run: bun run validate:deps

      - name: Type check monorepo
        run: bun run typecheck

      - name: Build monorepo
        run: bun run build
